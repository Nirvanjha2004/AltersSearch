version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    networks:
      - alterssearch-network

  repo-api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start"
    env_file:
      - ./repo-api/.env
    volumes:
      - ./repo-api:/app
    ports:
      - "4000:4000"
    networks:
      - alterssearch-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - repo-api
    networks:
      - alterssearch-network

networks:
  alterssearch-network:
    driver: bridge